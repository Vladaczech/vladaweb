<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knihovna promptů</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14181d;
    --sidebar:#0f1316;
    --panel:#1b2026;
    --panel-2:#20272e;
    --line:#2a3138;
    --text:#e6e9ec;
    --muted:#8b97a3;
    --muted-dim:#5e6b76;
    --accent:#e0a96d;
    --accent-dim:#a9764a;
    --ok:#6fbf8e;
    --danger:#d97a7a;
    --radius:10px;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:var(--sans);font-size:14px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer}
  ::selection{background:rgba(224,169,109,.3)}

  .app{display:grid;grid-template-columns:264px 1fr;height:100vh}

  /* ---------- Sidebar ---------- */
  .sidebar{
    background:var(--sidebar);border-right:1px solid var(--line);
    display:flex;flex-direction:column;min-height:0;
  }
  .brand{padding:18px 18px 14px;border-bottom:1px solid var(--line)}
  .brand .eyebrow{
    font-size:10px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--accent-dim);font-weight:600;
  }
  .brand h1{margin:3px 0 0;font-size:17px;font-weight:600;letter-spacing:-.01em}

  .themes-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px 8px;
  }
  .themes-head span{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-dim)}
  .icon-btn{
    background:none;border:1px solid var(--line);border-radius:7px;color:var(--muted);
    width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;
    transition:.15s;padding:0;
  }
  .icon-btn:hover{color:var(--text);border-color:var(--accent-dim)}
  .icon-btn svg{width:15px;height:15px}

  .theme-list{flex:1;overflow-y:auto;padding:4px 10px 10px}
  .theme{
    display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;
    color:var(--muted);position:relative;transition:.12s;user-select:none;
  }
  .theme:hover{background:var(--panel);color:var(--text)}
  .theme.active{background:var(--panel-2);color:var(--text)}
  .theme.active::before{
    content:"";position:absolute;left:-10px;top:8px;bottom:8px;width:3px;
    background:var(--accent);border-radius:0 3px 3px 0;
  }
  .theme .tname{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .theme .count{
    font-family:var(--mono);font-size:11px;color:var(--muted-dim);
    background:rgba(255,255,255,.04);padding:1px 7px;border-radius:20px;
  }
  .theme-actions{display:none;gap:2px}
  .theme:hover .theme-actions,.theme.active .theme-actions{display:flex}
  .mini{background:none;border:none;color:var(--muted-dim);padding:2px;border-radius:5px;line-height:0}
  .mini:hover{color:var(--text)}
  .mini svg{width:14px;height:14px}

  .empty-themes{padding:20px 18px;color:var(--muted-dim);font-size:13px;line-height:1.6}

  .sidebar-foot{border-top:1px solid var(--line);padding:12px}
  .sync-row{display:flex;gap:8px}
  .btn{
    border:1px solid var(--line);background:var(--panel);color:var(--text);
    border-radius:8px;padding:9px 12px;font-size:13px;font-weight:500;
    display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:.15s;
  }
  .btn svg{width:15px;height:15px}
  .btn:hover{border-color:var(--accent-dim)}
  .btn.primary{background:var(--accent);color:#1a120a;border-color:var(--accent);font-weight:600}
  .btn.primary:hover{background:#ecb87c}
  .btn.primary:disabled{opacity:.45;cursor:default;background:var(--accent)}
  .btn.ghost{background:none}
  .btn.grow{flex:1}
  .status{
    font-size:11.5px;color:var(--muted);margin-top:9px;display:flex;align-items:center;gap:6px;
    min-height:16px;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--muted-dim);flex:none}
  .dot.ok{background:var(--ok)}
  .dot.warn{background:var(--accent)}
  .dot.err{background:var(--danger)}
  .dot.dirty{background:var(--accent);box-shadow:0 0 0 3px rgba(224,169,109,.18)}

  /* ---------- Main ---------- */
  .main{display:flex;flex-direction:column;min-width:0}
  .topbar{
    display:flex;align-items:center;gap:14px;padding:16px 26px;
    border-bottom:1px solid var(--line);
  }
  .crumbs{flex:1;min-width:0}
  .crumbs .eyebrow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-dim)}
  .crumbs h2{margin:2px 0 0;font-size:19px;font-weight:600;letter-spacing:-.01em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .search{position:relative}
  .search input{
    background:var(--sidebar);border:1px solid var(--line);border-radius:8px;
    color:var(--text);padding:8px 12px 8px 32px;font-size:13px;width:220px;font-family:var(--sans);
    transition:.15s;
  }
  .search input:focus{outline:none;border-color:var(--accent-dim);width:260px}
  .search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted-dim)}

  .canvas{flex:1;overflow-y:auto;padding:22px 26px 60px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}

  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:15px 16px;display:flex;flex-direction:column;gap:10px;transition:.15s;cursor:pointer;
    min-height:118px;
  }
  .card:hover{border-color:var(--accent-dim);transform:translateY(-1px)}
  .card .ctitle{font-family:var(--mono);font-size:14px;font-weight:500;letter-spacing:-.01em}
  .card .cprev{
    font-size:12.5px;color:var(--muted);line-height:1.55;flex:1;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  }
  .card .cfoot{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
  .card .cmeta{font-family:var(--mono);font-size:10.5px;color:var(--muted-dim)}
  .card-copy{
    background:none;border:1px solid var(--line);border-radius:7px;color:var(--muted);
    padding:5px 10px;font-size:12px;display:inline-flex;align-items:center;gap:6px;transition:.15s;
  }
  .card-copy svg{width:13px;height:13px}
  .card-copy:hover{color:var(--text);border-color:var(--accent-dim)}
  .card-copy.done{color:var(--ok);border-color:var(--ok)}

  .blank{
    text-align:center;color:var(--muted-dim);padding:70px 20px;max-width:420px;margin:0 auto;
  }
  .blank svg{width:40px;height:40px;opacity:.5;margin-bottom:14px}
  .blank h3{color:var(--muted);font-weight:500;margin:0 0 6px;font-size:15px}
  .blank p{margin:0 0 18px;font-size:13px;line-height:1.6}

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(8,10,12,.66);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:24px;z-index:50;
  }
  .overlay.show{display:flex;animation:fade .15s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    width:100%;max-width:640px;max-height:86vh;display:flex;flex-direction:column;overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.5);
  }
  .modal.wide{max-width:560px}
  .mhead{display:flex;align-items:center;gap:10px;padding:18px 20px 14px;border-bottom:1px solid var(--line)}
  .mhead .eyebrow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-dim);flex:1}
  .mhead h3{margin:0;font-size:16px;font-weight:600}
  .mbody{padding:18px 20px;overflow-y:auto}
  .mfoot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
  .mfoot .left{margin-right:auto}

  label.fld{display:block;margin-bottom:14px}
  label.fld .lbl{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .input,.textarea,select.input{
    width:100%;background:var(--sidebar);border:1px solid var(--line);border-radius:8px;
    color:var(--text);padding:10px 12px;font-size:13px;font-family:var(--sans);transition:.15s;
  }
  .textarea{font-family:var(--mono);font-size:13px;line-height:1.55;resize:vertical;min-height:200px}
  .input:focus,.textarea:focus,select.input:focus{outline:none;border-color:var(--accent-dim)}
  .hint{font-size:11.5px;color:var(--muted-dim);margin-top:6px;line-height:1.5}
  .hint code{font-family:var(--mono);background:var(--sidebar);padding:1px 5px;border-radius:4px;color:var(--accent)}
  .hint a{color:var(--accent);text-decoration:none}
  .hint a:hover{text-decoration:underline}

  /* prompt view */
  .pview{font-family:var(--mono);font-size:13px;line-height:1.65;white-space:pre-wrap;word-break:break-word;
    background:var(--sidebar);border:1px solid var(--line);border-radius:10px;padding:16px;color:var(--text);
    max-height:48vh;overflow-y:auto}

  .x{margin-left:auto}
  .danger-text{color:var(--danger)}
  .small{font-size:12.5px;color:var(--muted);line-height:1.6}

  /* toast */
  .toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;
    z-index:80;box-shadow:0 10px 30px rgba(0,0,0,.4);display:flex;align-items:center;gap:9px;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .dot{width:8px;height:8px}

  /* scrollbars */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#2a323a;border-radius:6px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:#39434c}

  @media (max-width:760px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed;inset:0 40% 0 0;z-index:30;transform:translateX(-105%);transition:.2s}
    .sidebar.open{transform:none;box-shadow:0 0 40px rgba(0,0,0,.5)}
    .menu-btn{display:inline-flex !important}
    .search input{width:130px}
    .search input:focus{width:150px}
  }
  .menu-btn{display:none}
  @media (prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important}}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="eyebrow">Osobní</div>
      <h1>Knihovna promptů</h1>
    </div>

    <div class="themes-head">
      <span>Témata</span>
      <button class="icon-btn" id="addTheme" title="Nové téma">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
    <div class="theme-list" id="themeList"></div>

    <div class="sidebar-foot">
      <div class="sync-row">
        <button class="btn primary grow" id="saveBtn" title="Uložit aktuální stav do GitHub repozitáře">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
          Uložit na GitHub
        </button>
        <button class="icon-btn" id="reloadBtn" title="Načíst nejnovější verzi z GitHubu" style="width:38px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
        <button class="icon-btn" id="settingsBtn" title="Nastavení synchronizace" style="width:38px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
      <div class="status" id="status"><span class="dot"></span><span id="statusText">Připraveno</span></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <button class="icon-btn menu-btn" id="menuBtn" style="width:34px;height:34px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div class="crumbs">
        <div class="eyebrow" id="crumbEyebrow">Vyber téma</div>
        <h2 id="crumbTitle">Knihovna promptů</h2>
      </div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Hledat v promptech...">
      </div>
      <button class="btn" id="addPrompt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Nový prompt
      </button>
    </div>
    <div class="canvas" id="canvas"></div>
  </main>
</div>

<!-- generic overlay/modal -->
<div class="overlay" id="overlay"><div id="modalSlot"></div></div>

<div class="toast" id="toast"><span class="dot ok"></span><span id="toastText"></span></div>

<script>
"use strict";
/* ============ úložiště (bezpečné i v sandboxu) ============ */
const LS = {
  get(k){try{return localStorage.getItem(k)}catch(e){return null}},
  set(k,v){try{localStorage.setItem(k,v)}catch(e){}},
};
const K_CACHE='promptbox.cache', K_CFG='promptbox.config', K_TOK='promptbox.token';

/* ============ stav ============ */
let state = { themes: [] };
let config = { owner:'vladaczech', repo:'vladaweb', path:'prompts.json', branch:'main' };
let token = '';
let remoteSha = null;
let dirty = false;
let activeTheme = null;
let search = '';

/* načti uložené nastavení a cache */
(function init(){
  try{ const c=LS.get(K_CFG); if(c) config={...config,...JSON.parse(c)}; }catch(e){}
  token = LS.get(K_TOK) || '';
  try{ const d=LS.get(K_CACHE); if(d){ const p=JSON.parse(d); if(p&&Array.isArray(p.themes)) state=p; } }catch(e){}
  if(state.themes[0]) activeTheme = state.themes[0].id;
})();

/* ============ helpers ============ */
const $ = s => document.querySelector(s);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc = s => (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function utf8ToB64(str){const b=new TextEncoder().encode(str);let s='';b.forEach(x=>s+=String.fromCharCode(x));return btoa(s);}
function b64ToUtf8(b64){const bin=atob(b64.replace(/\s/g,''));const arr=Uint8Array.from(bin,c=>c.charCodeAt(0));return new TextDecoder().decode(arr);}

function persistLocal(){ LS.set(K_CACHE, JSON.stringify(state)); }
function markDirty(){ dirty=true; persistLocal(); renderStatus(); }

function themeById(id){ return state.themes.find(t=>t.id===id); }

/* ============ status + toast ============ */
function setStatus(text, kind){
  $('#statusText').textContent = text;
  const dot = $('#status .dot');
  dot.className = 'dot' + (kind?(' '+kind):'');
}
function renderStatus(){
  if(dirty) setStatus('Neuložené změny', 'dirty');
  else if(remoteSha) setStatus('Synchronizováno', 'ok');
  else setStatus('Lokálně (nesynced)', 'warn');
  $('#saveBtn').disabled = false;
}
let toastTimer;
function toast(msg, kind='ok'){
  $('#toastText').textContent = msg;
  $('#toast .dot').className = 'dot '+kind;
  $('#toast').classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>$('#toast').classList.remove('show'), 2400);
}

/* ============ render: témata ============ */
function renderThemes(){
  const list = $('#themeList');
  if(!state.themes.length){
    list.innerHTML = '<div class="empty-themes">Zatím žádná témata.<br>Klikni na <b>+</b> a vytvoř první kategorii promptů.</div>';
    return;
  }
  list.innerHTML = state.themes.map(t=>`
    <div class="theme ${t.id===activeTheme?'active':''}" data-theme="${t.id}">
      <span class="tname">${esc(t.name)}</span>
      <div class="theme-actions">
        <button class="mini" data-edit-theme="${t.id}" title="Přejmenovat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
        </button>
        <button class="mini" data-del-theme="${t.id}" title="Smazat téma">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
      <span class="count">${(t.prompts||[]).length}</span>
    </div>
  `).join('');
}

/* ============ render: prompty ============ */
function renderCanvas(){
  const canvas = $('#canvas');
  const theme = themeById(activeTheme);

  if(!theme){
    $('#crumbEyebrow').textContent = state.themes.length ? 'Vyber téma vlevo' : 'Začni tady';
    $('#crumbTitle').textContent = 'Knihovna promptů';
    canvas.innerHTML = blankState(
      state.themes.length ? 'Vyber téma' : 'Žádná témata',
      state.themes.length ? 'Klikni na téma v levém panelu a uvidíš jeho prompty.'
                          : 'Vytvoř první téma tlačítkem + a začni ukládat prompty.');
    return;
  }

  $('#crumbEyebrow').textContent = 'Téma';
  $('#crumbTitle').textContent = theme.name;

  let prompts = theme.prompts || [];
  if(search){
    const q = search.toLowerCase();
    prompts = prompts.filter(p => (p.title||'').toLowerCase().includes(q) || (p.body||'').toLowerCase().includes(q));
  }

  if(!prompts.length){
    canvas.innerHTML = blankState(
      search ? 'Nic nenalezeno' : 'Prázdné téma',
      search ? 'Žádný prompt neodpovídá hledání.' : 'Přidej první prompt tlačítkem „Nový prompt".');
    return;
  }

  canvas.innerHTML = `<div class="grid">${prompts.map(p=>`
    <div class="card" data-open="${p.id}">
      <div class="ctitle">${esc(p.title||'Bez názvu')}</div>
      <div class="cprev">${esc((p.body||'').slice(0,180))}</div>
      <div class="cfoot">
        <span class="cmeta">${(p.body||'').length} zn.</span>
        <button class="card-copy" data-copy="${p.id}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Kopírovat
        </button>
      </div>
    </div>`).join('')}</div>`;
}
function blankState(title, text){
  return `<div class="blank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    <h3>${esc(title)}</h3><p>${esc(text)}</p></div>`;
}

function renderAll(){ renderThemes(); renderCanvas(); renderStatus(); }

/* ============ kopírování ============ */
async function copyText(text){
  try{ await navigator.clipboard.writeText(text); return true; }
  catch(e){
    try{
      const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);return true;
    }catch(e2){return false;}
  }
}

/* ============ modály ============ */
function openModal(html){ $('#modalSlot').innerHTML = html; $('#overlay').classList.add('show'); }
function closeModal(){ $('#overlay').classList.remove('show'); $('#modalSlot').innerHTML=''; }
$('#overlay').addEventListener('mousedown', e=>{ if(e.target.id==='overlay') closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

/* --- téma: vytvořit / přejmenovat --- */
function themeModal(existing){
  const t = existing ? themeById(existing) : null;
  openModal(`
    <div class="modal wide">
      <div class="mhead"><span class="eyebrow">${t?'Upravit':'Nové'} téma</span>
        <button class="icon-btn x" data-close><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
      <div class="mbody">
        <label class="fld"><span class="lbl">Název tématu</span>
          <input class="input" id="themeName" value="${esc(t?t.name:'')}" placeholder="např. Práce / ADAS, Web, Osobní..." autofocus></label>
      </div>
      <div class="mfoot">
        <button class="btn ghost" data-close>Zrušit</button>
        <button class="btn primary" id="themeSave">${t?'Uložit':'Vytvořit'}</button>
      </div>
    </div>`);
  setTimeout(()=>$('#themeName')?.focus(),50);
  const save=()=>{
    const name=$('#themeName').value.trim();
    if(!name){ $('#themeName').focus(); return; }
    if(t){ t.name=name; }
    else { const nt={id:uid(),name,prompts:[]}; state.themes.push(nt); activeTheme=nt.id; }
    markDirty(); renderAll(); closeModal();
  };
  $('#themeSave').onclick=save;
  $('#themeName').addEventListener('keydown',e=>{if(e.key==='Enter')save();});
}

/* --- téma: smazat --- */
function deleteThemeModal(id){
  const t=themeById(id); if(!t) return;
  const n=(t.prompts||[]).length;
  openModal(`
    <div class="modal wide">
      <div class="mhead"><span class="eyebrow">Smazat téma</span>
        <button class="icon-btn x" data-close><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
      <div class="mbody"><p class="small">Opravdu smazat téma <b>${esc(t.name)}</b>${n?` včetně <b>${n}</b> promptů`:''}? Tuto akci nelze vrátit.<br><br>Změna se projeví na všech zařízeních až po kliknutí na <b>Uložit na GitHub</b>.</p></div>
      <div class="mfoot">
        <button class="btn ghost" data-close>Zrušit</button>
        <button class="btn" id="delConfirm" style="border-color:var(--danger);color:var(--danger)">Smazat téma</button>
      </div>
    </div>`);
  $('#delConfirm').onclick=()=>{
    state.themes=state.themes.filter(x=>x.id!==id);
    if(activeTheme===id) activeTheme=state.themes[0]?.id||null;
    markDirty(); renderAll(); closeModal();
    toast('Téma smazáno (zatím jen lokálně)','warn');
  };
}

/* --- prompt: vytvořit / upravit --- */
function promptEditModal(promptId){
  if(!activeTheme){ toast('Nejdřív vyber nebo vytvoř téma','warn'); return; }
  const theme=themeById(activeTheme);
  const p = promptId ? (theme.prompts||[]).find(x=>x.id===promptId) : null;
  openModal(`
    <div class="modal">
      <div class="mhead"><span class="eyebrow">${p?'Upravit prompt':'Nový prompt'} · ${esc(theme.name)}</span>
        <button class="icon-btn x" data-close><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
      <div class="mbody">
        <label class="fld"><span class="lbl">Název</span>
          <input class="input" id="pTitle" value="${esc(p?p.title:'')}" placeholder="Krátký výstižný název"></label>
        <label class="fld" style="margin-bottom:0"><span class="lbl">Text promptu</span>
          <textarea class="textarea" id="pBody" placeholder="Sem vlož celý prompt...">${esc(p?p.body:'')}</textarea></label>
      </div>
      <div class="mfoot">
        ${p?'<button class="btn ghost left" id="pDelete" style="color:var(--danger)">Smazat</button>':''}
        <button class="btn ghost" data-close>Zrušit</button>
        <button class="btn primary" id="pSave">${p?'Uložit změny':'Přidat prompt'}</button>
      </div>
    </div>`);
  setTimeout(()=>$('#pTitle')?.focus(),50);
  $('#pSave').onclick=()=>{
    const title=$('#pTitle').value.trim();
    const body=$('#pBody').value;
    if(!title && !body.trim()){ $('#pTitle').focus(); return; }
    if(p){ p.title=title||'Bez názvu'; p.body=body; p.updatedAt=Date.now(); }
    else { theme.prompts=theme.prompts||[]; theme.prompts.unshift({id:uid(),title:title||'Bez názvu',body,createdAt:Date.now(),updatedAt:Date.now()}); }
    markDirty(); renderAll(); closeModal();
  };
  if(p) $('#pDelete').onclick=()=>{
    theme.prompts=theme.prompts.filter(x=>x.id!==p.id);
    markDirty(); renderAll(); closeModal(); toast('Prompt smazán (lokálně)','warn');
  };
}

/* --- prompt: zobrazit + kopírovat --- */
function viewPromptModal(promptId){
  const theme=themeById(activeTheme); if(!theme) return;
  const p=(theme.prompts||[]).find(x=>x.id===promptId); if(!p) return;
  openModal(`
    <div class="modal">
      <div class="mhead"><span class="eyebrow">${esc(theme.name)}</span>
        <button class="icon-btn x" data-close><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
      <div class="mbody">
        <h3 style="margin:0 0 12px;font-family:var(--mono);font-size:16px;font-weight:500">${esc(p.title)}</h3>
        <div class="pview" id="pviewText">${esc(p.body)}</div>
      </div>
      <div class="mfoot">
        <button class="btn ghost left" id="pvEdit">Upravit</button>
        <button class="btn ghost" data-close>Zavřít</button>
        <button class="btn primary" id="pvCopy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Kopírovat prompt
        </button>
      </div>
    </div>`);
  $('#pvCopy').onclick=async()=>{
    if(await copyText(p.body)){ toast('Prompt zkopírován do schránky'); }
    else toast('Kopírování selhalo','err');
  };
  $('#pvEdit').onclick=()=>{ closeModal(); promptEditModal(p.id); };
}

/* --- nastavení synchronizace --- */
function settingsModal(){
  openModal(`
    <div class="modal">
      <div class="mhead"><span class="eyebrow">Nastavení · GitHub synchronizace</span>
        <button class="icon-btn x" data-close><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
      <div class="mbody">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 14px">
          <label class="fld"><span class="lbl">Vlastník (owner)</span><input class="input" id="cfgOwner" value="${esc(config.owner)}" placeholder="vladaczech"></label>
          <label class="fld"><span class="lbl">Repozitář</span><input class="input" id="cfgRepo" value="${esc(config.repo)}" placeholder="vladaweb"></label>
          <label class="fld"><span class="lbl">Soubor s daty</span><input class="input" id="cfgPath" value="${esc(config.path)}" placeholder="prompts.json"></label>
          <label class="fld"><span class="lbl">Větev (branch)</span><input class="input" id="cfgBranch" value="${esc(config.branch)}" placeholder="main"></label>
        </div>
        <label class="fld" style="margin-bottom:6px"><span class="lbl">GitHub token (Personal Access Token)</span>
          <input class="input" id="cfgToken" type="password" value="${esc(token)}" placeholder="github_pat_..." autocomplete="off"></label>
        <div class="hint">
          Token zůstává <b>jen v tomto prohlížeči</b> (localStorage) a nikdy se nezapisuje do repozitáře. Na každém zařízení ho zadáš zvlášť.<br><br>
          Vytvoř <b>Fine-grained PAT</b> na <a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener">github.com/settings/personal-access-tokens</a> → přístup jen k repu <code>${esc(config.repo)}</code> → oprávnění <code>Contents: Read and write</code>.
        </div>
      </div>
      <div class="mfoot">
        <button class="btn ghost left" id="cfgExport">Export JSON</button>
        <button class="btn ghost" data-close>Zrušit</button>
        <button class="btn primary" id="cfgSave">Uložit nastavení</button>
      </div>
    </div>`);
  $('#cfgSave').onclick=()=>{
    config.owner=$('#cfgOwner').value.trim();
    config.repo=$('#cfgRepo').value.trim();
    config.path=$('#cfgPath').value.trim()||'prompts.json';
    config.branch=$('#cfgBranch').value.trim()||'main';
    token=$('#cfgToken').value.trim();
    LS.set(K_CFG, JSON.stringify(config));
    LS.set(K_TOK, token);
    remoteSha=null;
    closeModal(); toast('Nastavení uloženo'); renderStatus();
  };
  $('#cfgExport').onclick=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='prompts-zaloha.json';a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  };
}

/* ============ GitHub API ============ */
function apiUrl(){ return `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${config.path}`; }
function ghHeaders(){
  const h={'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};
  if(token) h['Authorization']='Bearer '+token;
  return h;
}

async function pull(silent){
  if(!config.owner||!config.repo){ if(!silent) toast('Nejdřív vyplň nastavení (owner/repo)','warn'); settingsModal(); return; }
  setStatus('Načítám z GitHubu...','warn');
  try{
    const res=await fetch(apiUrl()+'?ref='+encodeURIComponent(config.branch)+'&t='+Date.now(), {headers:ghHeaders()});
    if(res.status===404){
      remoteSha=null; renderStatus();
      if(!silent) toast('Soubor zatím neexistuje – vytvoří se při prvním uložení','warn');
      return;
    }
    if(res.status===401||res.status===403){
      renderStatus(); if(!silent){ toast('Token chybí nebo nemá oprávnění','err'); settingsModal(); }
      setStatus('Chyba ověření','err'); return;
    }
    if(!res.ok){ throw new Error('HTTP '+res.status); }
    const data=await res.json();
    const parsed=JSON.parse(b64ToUtf8(data.content));
    if(parsed&&Array.isArray(parsed.themes)){
      state=parsed; remoteSha=data.sha; dirty=false;
      if(!themeById(activeTheme)) activeTheme=state.themes[0]?.id||null;
      persistLocal(); renderAll();
      if(!silent) toast('Načteno z GitHubu');
    }
  }catch(e){
    renderStatus(); setStatus('Chyba načítání','err');
    if(!silent) toast('Načtení selhalo: '+e.message,'err');
  }
}

async function push(){
  if(!token){ toast('Chybí GitHub token – otevři nastavení','warn'); settingsModal(); return; }
  if(!config.owner||!config.repo){ toast('Doplň owner a repo v nastavení','warn'); settingsModal(); return; }
  const btn=$('#saveBtn'); btn.disabled=true;
  setStatus('Ukládám na GitHub...','warn');
  try{
    const body={
      message:'Aktualizace promptů · '+new Date().toLocaleString('cs-CZ'),
      content:utf8ToB64(JSON.stringify(state,null,2)),
      branch:config.branch
    };
    if(remoteSha) body.sha=remoteSha;
    let res=await fetch(apiUrl(), {method:'PUT',headers:{...ghHeaders(),'Content-Type':'application/json'},body:JSON.stringify(body)});

    if(res.status===409 || (res.status===422 && !remoteSha)){
      // konflikt SHA / soubor mezitím vznikl – dotáhni aktuální sha a zkus jednou znovu
      const cur=await fetch(apiUrl()+'?ref='+encodeURIComponent(config.branch)+'&t='+Date.now(), {headers:ghHeaders()});
      if(cur.ok){ const d=await cur.json(); body.sha=d.sha; remoteSha=d.sha;
        res=await fetch(apiUrl(), {method:'PUT',headers:{...ghHeaders(),'Content-Type':'application/json'},body:JSON.stringify(body)});
      }
    }
    if(res.status===401||res.status===403){ setStatus('Chyba ověření','err'); toast('Token nemá právo zapisovat (Contents: write)','err'); btn.disabled=false; return; }
    if(!res.ok){ const t=await res.text(); throw new Error('HTTP '+res.status+' '+t.slice(0,120)); }
    const data=await res.json();
    remoteSha=data.content.sha; dirty=false; persistLocal(); renderStatus();
    toast('Uloženo na GitHub – sync proběhne na ostatních zařízeních po načtení');
  }catch(e){
    setStatus('Chyba ukládání','err'); toast('Uložení selhalo: '+e.message,'err');
  }finally{ btn.disabled=false; }
}

/* ============ události ============ */
$('#addTheme').onclick=()=>themeModal();
$('#addPrompt').onclick=()=>promptEditModal();
$('#settingsBtn').onclick=settingsModal;
$('#saveBtn').onclick=push;
$('#reloadBtn').onclick=()=>{ if(dirty && !confirm('Máš neuložené změny, které se přepíšou verzí z GitHubu. Pokračovat?')) return; pull(false); };

$('#searchInput').addEventListener('input',e=>{ search=e.target.value; renderCanvas(); });

$('#themeList').addEventListener('click',e=>{
  const ed=e.target.closest('[data-edit-theme]'); if(ed){ themeModal(ed.dataset.editTheme); return; }
  const del=e.target.closest('[data-del-theme]'); if(del){ deleteThemeModal(del.dataset.delTheme); return; }
  const th=e.target.closest('[data-theme]'); if(th){ activeTheme=th.dataset.theme; search=''; $('#searchInput').value=''; renderAll(); if(window.innerWidth<=760) $('#sidebar').classList.remove('open'); }
});

$('#canvas').addEventListener('click',async e=>{
  const cp=e.target.closest('[data-copy]');
  if(cp){
    e.stopPropagation();
    const theme=themeById(activeTheme); const p=(theme?.prompts||[]).find(x=>x.id===cp.dataset.copy);
    if(p && await copyText(p.body)){
      cp.classList.add('done'); cp.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> Zkopírováno';
      setTimeout(()=>{ cp.classList.remove('done'); cp.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Kopírovat'; },1400);
    }
    return;
  }
  const card=e.target.closest('[data-open]'); if(card) viewPromptModal(card.dataset.open);
});

document.addEventListener('click',e=>{ if(e.target.closest('[data-close]')) closeModal(); });
$('#menuBtn').onclick=()=>$('#sidebar').classList.toggle('open');

/* ============ start ============ */
renderAll();
if(config.owner && config.repo){ pull(true); }   // tiché načtení aktuální verze při startu
</script>
